name: 自动生成动态索引

on:
  push:
    paths:
      - 'dt/dynamic/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 运行生成脚本
        run: python generate_dt.py
      - name: 提交并推送 JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dt/data/dynamics.json
          git diff --cached --quiet || git commit -m "自动更新动态索引"
          git push
